{% extends "base.html" %}

{% block title %}New Game - Rummy Score Tracker{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto pt-4">
    <div class="glass-card p-6 sm:p-8 animate-in">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold" style="font-family: 'Playfair Display', serif; color: var(--cream);">New Game</h2>
            <p class="mt-1 text-sm" style="color: rgba(245,240,229,0.4);">Set up your card room</p>
        </div>

        <form id="gameSetupForm" method="POST" action="{{ base_path }}/game/create" class="space-y-8">
            <!-- Number of Players -->
            <div>
                <label class="block text-sm font-medium mb-3" style="color: rgba(245,240,229,0.6);">
                    Number of Players
                </label>
                <div class="chip-group">
                    {% for i in range(2, 9) %}
                    <label class="chip">
                        <input type="radio" name="num_players" value="{{ i }}" required>
                        <div class="chip-visual">{{ i }}</div>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <!-- Score Cutoff -->
            <div x-data="{ cutoffMode: '201', customValue: '' }">
                <label class="block text-sm font-medium mb-3" style="color: rgba(245,240,229,0.6);">
                    Score Cutoff
                </label>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    <label class="cutoff-option">
                        <input type="radio" name="score_cutoff_option" value="100" @change="cutoffMode = '100'; document.getElementById('score_cutoff_field').value = 100" required>
                        <div class="cutoff-visual">
                            <div class="cutoff-value">100</div>
                            <div class="cutoff-label">Quick</div>
                        </div>
                    </label>
                    <label class="cutoff-option">
                        <input type="radio" name="score_cutoff_option" value="150" @change="cutoffMode = '150'; document.getElementById('score_cutoff_field').value = 150">
                        <div class="cutoff-visual">
                            <div class="cutoff-value">150</div>
                            <div class="cutoff-label">Standard</div>
                        </div>
                    </label>
                    <label class="cutoff-option">
                        <input type="radio" name="score_cutoff_option" value="201" checked @change="cutoffMode = '201'; document.getElementById('score_cutoff_field').value = 201">
                        <div class="cutoff-visual">
                            <div class="cutoff-value">201</div>
                            <div class="cutoff-label">Long</div>
                        </div>
                    </label>
                    <label class="cutoff-option">
                        <input type="radio" name="score_cutoff_option" value="custom" @change="cutoffMode = 'custom'; $nextTick(() => $refs.customInput.focus())">
                        <div class="cutoff-visual">
                            <div class="cutoff-value" style="font-size: 1.1rem;">&#9830;</div>
                            <div class="cutoff-label">Custom</div>
                        </div>
                    </label>
                </div>
                <div x-show="cutoffMode === 'custom'" x-transition class="mt-3">
                    <input
                        type="number"
                        x-ref="customInput"
                        x-model="customValue"
                        @input="document.getElementById('score_cutoff_field').value = $event.target.value"
                        min="1"
                        placeholder="Enter score cutoff"
                        class="input-field"
                    >
                </div>
                <input type="hidden" name="score_cutoff" id="score_cutoff_field" value="201">
            </div>

            <!-- Player Names -->
            <div id="playerNamesSection" class="hidden">
                <label class="block text-sm font-medium mb-3" style="color: rgba(245,240,229,0.6);">
                    Player Names
                </label>
                <div id="playerNameFields" class="space-y-3"></div>
                <input type="hidden" name="player_names" id="player_names">
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden alert-error"></div>

            <!-- Submit Button -->
            <button type="submit" class="btn-gold w-full py-3 text-base">
                Deal the Cards
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="{{ base_path }}/game/dashboard" class="nav-link text-sm">
                &larr; Back to Dashboard
            </a>
        </div>
    </div>
</div>

<script>
function renderPlayerFields(numPlayers) {
    const container = document.getElementById('playerNameFields');
    const section = document.getElementById('playerNamesSection');
    container.innerHTML = '';
    section.classList.remove('hidden');

    for (let i = 1; i <= numPlayers; i++) {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-3';
        div.style.animation = `fadeInUp 0.3s ease-out ${i * 0.05}s both`;
        div.innerHTML = `
            <span class="rank-badge gold flex-shrink-0" style="width: 2rem; height: 2rem; font-size: 0.75rem;">${i}</span>
            <input
                type="text"
                data-player-name
                placeholder="Player ${i}"
                class="input-field"
                required
            >
        `;
        container.appendChild(div);
    }

    const first = container.querySelector('input');
    if (first) first.focus();
}

document.querySelectorAll('input[name="num_players"]').forEach(radio => {
    radio.addEventListener('change', function() {
        renderPlayerFields(parseInt(this.value));
    });
});

document.getElementById('gameSetupForm').addEventListener('submit', function(e) {
    const errorMessage = document.getElementById('errorMessage');
    const inputs = document.querySelectorAll('[data-player-name]');
    const names = Array.from(inputs).map(input => input.value.trim());

    if (names.some(n => !n)) {
        e.preventDefault();
        errorMessage.textContent = 'Please enter a name for every player.';
        errorMessage.classList.remove('hidden');
        return;
    }

    const uniqueNames = new Set(names.map(n => n.toLowerCase()));
    if (uniqueNames.size !== names.length) {
        e.preventDefault();
        errorMessage.textContent = 'Player names must be unique.';
        errorMessage.classList.remove('hidden');
        return;
    }

    const cutoff = parseInt(document.getElementById('score_cutoff_field').value);
    if (!cutoff || cutoff <= 0) {
        e.preventDefault();
        errorMessage.textContent = 'Please enter a valid score cutoff (must be a positive number).';
        errorMessage.classList.remove('hidden');
        return;
    }

    document.getElementById('player_names').value = names.join(', ');
    errorMessage.classList.add('hidden');
});
</script>
{% endblock %}
