<!DOCTYPE html>
<html lang="en" x-data="{ mobileMenu: false }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rummy Score Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="{{ base_path }}/static/css/custom.css">
</head>
<body>
    <!-- Felt texture background -->
    <div class="felt-bg"></div>

    <!-- Floating suit decorations -->
    <div class="suit-scatter">
        <span>&#9824;</span><span>&#9829;</span><span>&#9830;</span><span>&#9827;</span>
        <span>&#9824;</span><span>&#9829;</span><span>&#9830;</span><span>&#9827;</span>
    </div>

    <!-- Navigation -->
    <nav class="nav-bar sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 sm:px-6">
            <div class="flex justify-between h-14">
                <div class="flex items-center">
                    <a href="{{ base_path }}/" class="nav-logo">
                        <span class="suit-icon">&#9824;</span>
                        Rummy
                    </a>
                </div>

                <!-- Mobile menu button -->
                <div class="flex items-center sm:hidden">
                    <button @click="mobileMenu = !mobileMenu" class="p-2 rounded-md text-gray-400 hover:text-white transition-colors">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path x-show="!mobileMenu" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                            <path x-show="mobileMenu" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <!-- Desktop menu -->
                <div class="hidden sm:flex sm:items-center gap-2">
                    <a href="{{ base_path }}/" class="nav-link">Home</a>
                    <a href="{{ base_path }}/auth/login" class="nav-cta">Track Scores</a>
                </div>
            </div>
        </div>

        <!-- Mobile menu -->
        <div x-show="mobileMenu" x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-2"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 -translate-y-2"
             class="sm:hidden border-t border-white/5">
            <div class="px-4 py-3 space-y-2">
                <a href="{{ base_path }}/" class="nav-link block">Home</a>
                <a href="{{ base_path }}/auth/login" class="nav-cta block text-center">Track Scores</a>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer mt-16">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6">
            <div class="text-center text-sm" style="color: rgba(245,240,229,0.3);">
                <p>Built with care in Texas, USA &bull; <a href="https://kudithipudi.org">Vinay Kudithipudi</a></p>
            </div>
        </div>
    </footer>

    <script>
        window.BASE_PATH = '{{ base_path }}';
    </script>
    <script src="{{ base_path }}/static/js/app.js"></script>
</body>
</html>
