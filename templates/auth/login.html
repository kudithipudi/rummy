{% extends "base.html" %}

{% block title %}Login - Rummy Score Tracker{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white shadow-lg rounded-lg p-6 border border-gray-200">
        <div class="text-center mb-6">
            <div class="text-4xl mb-3">🃏</div>
            <h2 class="text-2xl font-bold text-gray-900">Welcome Back!</h2>
            <p class="text-gray-600 mt-1">Sign in to start tracking your rummy games</p>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    Email Address
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    placeholder="your@email.com"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                >
            </div>
            
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-md text-sm">
            </div>
            
            <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-md text-sm">
            </div>
            
            <button 
                type="submit" 
                id="submitButton"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
                Send Magic Link
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                We'll send you a secure link to access your games
            </p>
            <p class="text-xs text-gray-500 mt-2">
                No password needed • Link expires in 7 days
            </p>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const submitButton = document.getElementById('submitButton');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    
    // Reset messages
    errorMessage.classList.add('hidden');
    successMessage.classList.add('hidden');
    
    // Disable button
    submitButton.disabled = true;
    submitButton.textContent = 'Sending...';
    
    try {
        const response = await fetch(window.BASE_PATH + '/auth/magic-link', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email: email })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            successMessage.textContent = '✉️ Logging you in...';
            successMessage.classList.remove('hidden');
            document.getElementById('email').disabled = true;
            if (data.redirect_url) {
                setTimeout(() => {
                    window.location.href = data.redirect_url;
                }, 500);
            }
        } else {
            errorMessage.textContent = data.detail || 'Failed to send magic link. Please try again.';
            errorMessage.classList.remove('hidden');
        }
    } catch (error) {
        errorMessage.textContent = 'Network error. Please try again.';
        errorMessage.classList.remove('hidden');
    } finally {
        if (!document.getElementById('email').disabled) {
            submitButton.disabled = false;
            submitButton.textContent = 'Send Magic Link';
        } else {
            submitButton.textContent = '✓ Email Sent';
        }
    }
});
</script>
{% endblock %}
