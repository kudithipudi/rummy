{% extends "base.html" %}

{% block title %}Login - Rummy Score Tracker{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto pt-8 sm:pt-16">
    <div class="glass-card p-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: linear-gradient(135deg, var(--gold), var(--gold-dim)); box-shadow: 0 4px 20px rgba(212,168,67,0.3);">
                <span style="font-size: 1.75rem; color: var(--felt-deep);">&#9824;</span>
            </div>
            <h2 class="text-2xl font-bold" style="font-family: 'Playfair Display', serif; color: var(--cream);">Welcome Back</h2>
            <p class="mt-2 text-sm" style="color: rgba(245,240,229,0.45);">Sign in to your card room</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium mb-2" style="color: rgba(245,240,229,0.6);">
                    Email Address
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="your@email.com"
                    class="input-field"
                    autocomplete="email"
                >
            </div>

            <div id="errorMessage" class="hidden alert-error"></div>
            <div id="successMessage" class="hidden alert-success"></div>

            <button
                type="submit"
                id="submitButton"
                class="btn-gold w-full py-3"
            >
                Send Magic Link
            </button>
        </form>

        <div class="mt-6 text-center space-y-2">
            <p class="text-sm" style="color: rgba(245,240,229,0.4);">
                We'll send a secure link to access your games
            </p>
            <p class="text-xs" style="color: rgba(245,240,229,0.25);">
                No password needed &bull; Link expires in 7 days
            </p>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const submitButton = document.getElementById('submitButton');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    errorMessage.classList.add('hidden');
    successMessage.classList.add('hidden');

    submitButton.disabled = true;
    submitButton.textContent = 'Sending...';

    try {
        const response = await fetch(window.BASE_PATH + '/auth/magic-link', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
        });

        const data = await response.json();

        if (response.ok) {
            successMessage.textContent = 'Logging you in...';
            successMessage.classList.remove('hidden');
            document.getElementById('email').disabled = true;
            submitButton.textContent = 'Sent';
            if (data.redirect_url) {
                setTimeout(() => {
                    window.location.href = data.redirect_url;
                }, 500);
            }
        } else {
            errorMessage.textContent = data.detail || 'Failed to send magic link. Please try again.';
            errorMessage.classList.remove('hidden');
        }
    } catch (error) {
        errorMessage.textContent = 'Network error. Please try again.';
        errorMessage.classList.remove('hidden');
    } finally {
        if (!document.getElementById('email').disabled) {
            submitButton.disabled = false;
            submitButton.textContent = 'Send Magic Link';
        }
    }
});
</script>
{% endblock %}
