{% extends "base.html" %}

{% block title %}Authentication Error - Rummy Score Tracker{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto pt-8 sm:pt-16">
    <div class="glass-card p-8">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.25);">
                <span style="font-size: 1.75rem; color: #e74c3c;">&#9829;</span>
            </div>
            <h2 class="text-2xl font-bold mb-2" style="font-family: 'Playfair Display', serif; color: var(--cream);">Authentication Error</h2>
            <p class="text-sm mb-6" style="color: rgba(245,240,229,0.5);">{{ error }}</p>

            <div class="space-y-3">
                <a href="{{ base_path }}/auth/login" class="btn-gold w-full py-2.5">
                    Try Again
                </a>
                <a href="{{ base_path }}/" class="btn-ghost w-full py-2.5">
                    Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
